<html lang="zh-CN">
<head>

  <style>
    :root{
      --bg: #f6f3ee;
      --panel: rgba(255,255,255,.82);
      --panel-strong: rgba(255,255,255,.94);
      --text: #2b2723;
      --muted: #776d64;
      --line: rgba(78,63,51,.12);
      --line-strong: rgba(78,63,51,.20);
      --brand: #6b5c4f;
      --brand-soft: rgba(107,92,79,.10);
      --price: #5a493c;
      --shadow: 0 10px 28px rgba(57, 43, 31, .08);
      --content-width: 1180px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(134,114,96,.10), transparent 26%),
        radial-gradient(circle at top right, rgba(107,92,79,.10), transparent 24%),
        linear-gradient(180deg, #f9f6f1 0%, #f3efe8 100%);
      line-height:1.5;
    }
    .page{width:min(calc(100% - 24px), var(--content-width));margin:0 auto;padding:18px 0 48px}
    .hero{position:relative;overflow:hidden;background:linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,255,255,.76));border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:24px 20px 18px;margin-bottom:14px}
    .hero::after{content:"";position:absolute;inset:auto -60px -60px auto;width:220px;height:220px;background:radial-gradient(circle, rgba(107,92,79,.12), transparent 68%);pointer-events:none}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border-radius:999px;background:var(--brand-soft);color:var(--brand);font-size:12px;letter-spacing:.08em;margin-bottom:10px}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--brand);opacity:.85;flex:0 0 auto}
    h1{margin:0;font-size:clamp(28px, 5.2vw, 42px);line-height:1.06;letter-spacing:.02em;font-weight:750}
    .sub{margin:10px 0 0;color:var(--muted);font-size:14px}
    .topbar{position:sticky;top:0;z-index:20;padding:10px 0 12px;backdrop-filter: blur(10px);-webkit-backdrop-filter: blur(10px);background:linear-gradient(180deg, rgba(246,243,238,.92), rgba(246,243,238,.78) 80%, rgba(246,243,238,0))}
    .nav{display:flex;gap:10px;overflow:auto;padding:4px 1px 6px;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}
    .nav a{flex:0 0 auto;text-decoration:none;color:var(--brand);background:rgba(255,255,255,.78);border:1px solid var(--line);padding:11px 14px;border-radius:999px;font-size:14px;font-weight:650;box-shadow:0 4px 10px rgba(63,49,38,.04);transition:.18s ease}
    .nav a:hover,.nav a:focus-visible{transform:translateY(-1px);background:#fff;border-color:var(--line-strong);outline:none}
    .section{scroll-margin-top:92px;margin-top:24px}
    .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px}
    .section-title-wrap{display:flex;align-items:center;gap:12px;min-width:0}
    .section-title{margin:0;font-size:clamp(22px, 4vw, 30px);line-height:1.15;font-weight:760;letter-spacing:.02em}
    .section-note{color:var(--muted);font-size:13px;white-space:nowrap}
    .section-icon{width:42px;height:42px;border-radius:14px;background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.68));border:1px solid var(--line);display:grid;place-items:center;box-shadow:0 6px 18px rgba(63,49,38,.05);flex:0 0 auto}
    .grid{display:grid;grid-template-columns: repeat(3, minmax(0, 1fr));gap:12px}
    .item{position:relative;display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 6px 18px rgba(63,49,38,.04);min-height:82px;transition:.18s ease}
    .item:hover{transform:translateY(-1px);background:var(--panel-strong);border-color:var(--line-strong)}
    .icon{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(180deg, rgba(107,92,79,.11), rgba(107,92,79,.05));border:1px solid rgba(107,92,79,.10);color:var(--brand);flex:0 0 auto}
    .meta{min-width:0;flex:1 1 auto}.name{font-size:17px;font-weight:680;letter-spacing:.01em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .subline{margin-top:5px;color:var(--muted);font-size:12px;display:flex;align-items:center;gap:8px}
    .price{flex:0 0 auto;display:flex;align-items:baseline;gap:2px;margin-left:6px;color:var(--price);font-weight:760;white-space:nowrap}.price .unit{font-size:12px;color:var(--muted);font-weight:600}.price .num{font-size:26px;line-height:1;letter-spacing:-0.02em}
    .footer{margin-top:28px;color:var(--muted);font-size:12px;text-align:center;padding:8px 10px 0}
    @media (max-width: 980px){.grid{grid-template-columns: repeat(2, minmax(0, 1fr));}}
    @media (max-width: 640px){.page{width:min(calc(100% - 16px), var(--content-width));padding-top:10px}.hero{padding:18px 16px 15px;border-radius:22px}.nav a{padding:10px 13px;font-size:13px}.section{margin-top:20px;scroll-margin-top:84px}.section-head{align-items:center}.section-note{font-size:12px}.grid{grid-template-columns:1fr;gap:10px}.item{min-height:76px;padding:12px;border-radius:16px}.icon{width:42px;height:42px;border-radius:12px}.name{font-size:16px}.price .num{font-size:24px}}
  </style>
</head>

        default: `<svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="5" ${common}/></svg>`
      };
      return map[type] || map.default;
    }

    function renderNav(data) {
      const nav = document.getElementById("categoryNav");
      nav.innerHTML = data.map(section => `<a href="#${section.id}">${section.name}</a>`).join("");
    }

    function renderMenu(data) {
      const root = document.getElementById("menuRoot");
      root.innerHTML = data.map(section => `
        <section class="section" id="${section.id}">
          <div class="section-head">
            <div class="section-title-wrap">
              <div class="section-icon">${svgIcon(section.icon)}</div>
              <h2 class="section-title">${section.name}</h2>
            </div>
            <div class="section-note">${section.note}</div>
          </div>
          <div class="grid">
            ${section.items.map(item => `
              <article class="item">
                <div class="icon">${svgIcon(item.icon)}</div>
                <div class="meta">
                  <div class="name">${item.name}</div>
                  <div class="subline"><span>${section.name}</span></div>
                </div>
                <div class="price" aria-label="价格 ${item.price} 元">
                  <span class="unit">¥</span>
                  <span class="num">${item.price}</span>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `).join("");
    }

    renderNav(menuData);
    renderMenu(menuData);
  </script>
</body>
</html>
