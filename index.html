<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>窗台烧烤｜菜单</title>
  <style>
    :root{
      --bg: #f5f1eb;
      --bg-2: #f8f5f0;
      --panel: rgba(255,255,255,.90);
      --panel-strong: rgba(255,255,255,.98);
      --text: #2c2824;
      --muted: #85796f;
      --line: rgba(82,66,53,.10);
      --line-strong: rgba(82,66,53,.18);

      --brand: #6b5c4f;
      --brand-soft: rgba(107,92,79,.08);

      --warm: #8b5e46;
      --warm-soft: rgba(139,94,70,.10);
      --warm-strong: #7b4e36;

      --accent: #b76a43;
      --accent-soft: rgba(183,106,67,.12);

      --price: #583f33;
      --shadow-soft: 0 6px 18px rgba(58,44,33,.04);
      --shadow: 0 16px 40px rgba(58,44,33,.06);

      --content-width: 1180px;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC",
        "Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text);
      line-height:1.5;
      background:
        radial-gradient(circle at top left, rgba(139,94,70,.07), transparent 26%),
        radial-gradient(circle at top right, rgba(107,92,79,.05), transparent 22%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    }

    .page{
      width:min(calc(100% - 48px), var(--content-width));
      margin:0 auto;
      padding:26px 0 72px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at right bottom, rgba(183,106,67,.12), transparent 32%),
        linear-gradient(135deg, rgba(255,255,255,.93), rgba(255,255,255,.78));
      border:1px solid var(--line);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:32px 30px 26px;
      margin-bottom:20px;
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-80px;
      bottom:-80px;
      width:280px;
      height:280px;
      background:radial-gradient(circle, rgba(183,106,67,.13), transparent 68%);
      pointer-events:none;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:var(--warm-soft);
      color:var(--warm-strong);
      font-size:12px;
      letter-spacing:.08em;
      margin-bottom:14px;
      border:1px solid rgba(139,94,70,.08);
    }

    .dot{
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--accent);
      opacity:.95;
      flex:0 0 auto;
    }

    h1{
      margin:0;
      font-size:clamp(32px, 4vw, 46px);
      line-height:1.04;
      letter-spacing:.02em;
      font-weight:780;
    }

    .sub{
      margin:14px 0 0;
      color:var(--muted);
      font-size:14px;
      max-width:760px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      padding:14px 0 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background:linear-gradient(180deg, rgba(245,241,235,.94), rgba(245,241,235,.82) 78%, rgba(245,241,235,0));
    }

    .nav{
      display:flex;
      gap:12px;
      overflow:auto;
      padding:2px 2px 8px;
      scrollbar-width:none;
    }

    .nav::-webkit-scrollbar{ display:none; }

    .nav a{
      flex:0 0 auto;
      text-decoration:none;
      color:var(--brand);
      background:rgba(255,255,255,.84);
      border:1px solid var(--line);
      padding:12px 16px;
      border-radius:999px;
      font-size:14px;
      font-weight:650;
      box-shadow:var(--shadow-soft);
      transition:.18s ease;
    }

    .nav a:hover,
    .nav a:focus-visible{
      transform:translateY(-1px);
      background:#fff;
      border-color:rgba(139,94,70,.18);
      color:var(--warm-strong);
      outline:none;
    }

    .section{
      scroll-margin-top:98px;
      margin-top:64px;
      padding-top:2px;
    }

    .section:first-of-type{
      margin-top:30px;
    }

    .section-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
      margin-bottom:22px;
      padding:0 2px;
    }

    .section-title-wrap{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .section-icon{
      width:50px;
      height:50px;
      border-radius:17px;
      background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.76));
      border:1px solid rgba(139,94,70,.10);
      display:grid;
      place-items:center;
      color:var(--warm-strong);
      box-shadow:var(--shadow-soft);
      flex:0 0 auto;
    }

    .section-title-block{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .section-title{
      margin:0;
      font-size:clamp(26px, 3vw, 36px);
      line-height:1.1;
      font-weight:790;
      letter-spacing:.02em;
    }

    .section-desc{
      font-size:12px;
      color:var(--muted);
    }

    .section-note{
      color:var(--muted);
      font-size:14px;
      white-space:nowrap;
      padding-bottom:5px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:18px;
    }

    .item{
      position:relative;
      display:flex;
      align-items:center;
      gap:15px;
      min-height:112px;
      padding:20px 20px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow-soft);
      transition:.18s ease;
    }

    .item:hover{
      transform:translateY(-1px);
      background:var(--panel-strong);
      border-color:rgba(139,94,70,.18);
      box-shadow:0 14px 32px rgba(58,44,33,.06);
    }

    .item.recommended{
      border-color: rgba(183,106,67,.20);
      box-shadow:
        0 14px 32px rgba(58,44,33,.05),
        inset 0 1px 0 rgba(183,106,67,.08);
    }

    .item.recommended::before{
      content:"";
      position:absolute;
      left:0;
      top:16px;
      bottom:16px;
      width:4px;
      border-radius:999px;
      background:linear-gradient(180deg, #cf7d50, #9a5f40);
      opacity:.95;
    }

    .icon{
      width:54px;
      height:54px;
      border-radius:17px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      color:var(--warm-strong);
      background:linear-gradient(180deg, rgba(183,106,67,.09), rgba(107,92,79,.04));
      border:1px solid rgba(139,94,70,.10);
    }

    .meta{
      min-width:0;
      flex:1 1 auto;
    }

    .title-row{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      flex-wrap:wrap;
    }

    .name{
      font-size:19px;
      font-weight:720;
      letter-spacing:.01em;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:4px;
      height:24px;
      padding:0 9px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      letter-spacing:.02em;
      border:1px solid transparent;
      white-space:nowrap;
    }

    .tag.recommend{
      color:#8b4d2d;
      background:rgba(207,125,80,.13);
      border-color:rgba(207,125,80,.14);
    }

    .tag.signature{
      color:#7a4b1c;
      background:rgba(214,160,73,.16);
      border-color:rgba(214,160,73,.14);
    }

    .tag.pairing{
      color:#6f4f39;
      background:rgba(129,102,79,.10);
      border-color:rgba(129,102,79,.10);
    }

    .subline{
      margin-top:8px;
      color:var(--muted);
      font-size:12px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .hint{
      display:inline-flex;
      align-items:center;
      gap:4px;
      color:var(--warm);
      font-weight:600;
    }

    .price{
      flex:0 0 auto;
      margin-left:8px;
      display:flex;
      align-items:baseline;
      gap:3px;
      white-space:nowrap;
      color:var(--price);
      font-weight:800;
    }

    .price .unit{
      font-size:12px;
      color:var(--muted);
      font-weight:600;
    }

    .price .num{
      font-size:31px;
      line-height:1;
      letter-spacing:-0.02em;
    }

    .price.hot .num{
      color:var(--warm-strong);
    }

    .footer{
      margin-top:52px;
      padding-top:8px;
      text-align:center;
      color:var(--muted);
      font-size:12px;
    }

    @media (max-width: 1080px){
      .page{
        width:min(calc(100% - 28px), var(--content-width));
      }

      .grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px){
      .page{
        width:min(calc(100% - 16px), var(--content-width));
        padding:10px 0 48px;
      }

      .hero{
        padding:18px 16px 15px;
        border-radius:22px;
        margin-bottom:12px;
      }

      .sub{
        margin-top:10px;
        font-size:13px;
      }

      .topbar{
        padding:8px 0 10px;
      }

      .nav{
        gap:10px;
        padding-bottom:6px;
      }

      .nav a{
        padding:10px 13px;
        font-size:13px;
      }

      .section{
        margin-top:34px;
        scroll-margin-top:84px;
      }

      .section:first-of-type{
        margin-top:18px;
      }

      .section-head{
        align-items:center;
        margin-bottom:12px;
      }

      .section-icon{
        width:42px;
        height:42px;
        border-radius:14px;
      }

      .section-note{
        font-size:12px;
        padding-bottom:0;
      }

      .section-desc{
        display:none;
      }

      .grid{
        grid-template-columns:1fr;
        gap:10px;
      }

      .item{
        min-height:84px;
        padding:12px;
        border-radius:16px;
      }

      .item.recommended::before{
        top:12px;
        bottom:12px;
      }

      .icon{
        width:42px;
        height:42px;
        border-radius:12px;
      }

      .name{
        font-size:16px;
      }

      .tag{
        height:22px;
        padding:0 8px;
        font-size:10px;
      }

      .subline{
        margin-top:5px;
      }

      .price .num{
        font-size:24px;
      }
    }
  </style>
</head>

    function tagClass(tag){
      if(tag === "recommend") return "recommend";
      if(tag === "signature") return "signature";
      if(tag === "pairing") return "pairing";
      return "";
    }

    function tagText(tag){
      if(tag === "recommend") return "推荐";
      if(tag === "signature") return "招牌";
      if(tag === "pairing") return "下酒";
      return "";
    }

    function renderNav(data) {
      const nav = document.getElementById("categoryNav");
      nav.innerHTML = data.map(section => `
        <a href="#${section.id}">${section.name}</a>
      `).join("");
    }

    function renderMenu(data) {
      const root = document.getElementById("menuRoot");
      root.innerHTML = data.map(section => `
        <section class="section" id="${section.id}">
          <div class="section-head">
            <div class="section-title-wrap">
              <div class="section-icon">${svgIcon(section.icon)}</div>
              <div class="section-title-block">
                <h2 class="section-title">${section.name}</h2>
                <div class="section-desc">${section.desc || ""}</div>
              </div>
            </div>
            <div class="section-note">${section.note}</div>
          </div>
          <div class="grid">
            ${section.items.map(item => `
              <article class="item ${item.tag ? 'recommended' : ''}">
                <div class="icon">${svgIcon(item.icon)}</div>
                <div class="meta">
                  <div class="title-row">
                    <div class="name">${item.name}</div>
                    ${item.tag ? `<span class="tag ${tagClass(item.tag)}">${tagText(item.tag)}</span>` : ``}
                  </div>
                  <div class="subline">
                    ${item.hint ? `<span class="hint">${item.hint}</span>` : `<span>${section.name}</span>`}
                  </div>
                </div>
                <div class="price ${item.tag ? 'hot' : ''}" aria-label="价格 ${item.price} 元">
                  <span class="unit">¥</span>
                  <span class="num">${item.price}</span>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `).join("");
    }

    renderNav(menuData);
    renderMenu(menuData);
  </script>
