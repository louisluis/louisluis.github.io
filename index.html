<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>窗台烧烤 - 菜单</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f9f9fb; /* 更柔和的背景灰 */
            --surface-color: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --brand-color: #c85a17; /* 烧烤/精酿质感的深琥珀色 */
            --brand-light: #fef5f0; /* 图标背景色 */
            --nav-height: 64px;
            --radius-card: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-top: var(--nav-height);
            padding-bottom: 40px;
        }

        /* 顶部悬浮导航 - 增加毛玻璃效果 */
        .category-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 1000;
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }

        .nav-item {
            flex: 0 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-item.active {
            color: var(--brand-color);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background-color: var(--brand-color);
            border-radius: 3px 3px 0 0;
        }

        /* 主体内容区 */
        .menu-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        .category-section {
            margin-bottom: 48px;
            scroll-margin-top: calc(var(--nav-height) + 24px);
        }

        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .category-header i {
            font-size: 24px;
            color: var(--brand-color);
            margin-right: 12px;
        }

        .category-header h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* 呼吸感卡片网格布局 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 手机端双列卡片，避免密集列表 */
            gap: 16px;
        }

        @media (min-width: 768px) {
            .items-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; }
        }
        @media (min-width: 1024px) {
            .items-grid { grid-template-columns: repeat(4, 1fr); gap: 32px; }
        }

        /* 独立菜品卡片 */
        .item-card {
            background-color: var(--surface-color);
            border-radius: var(--radius-card);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .item-card:active {
            transform: scale(0.98);
        }

        /* 核心视觉：强化的矢量图标容器 */
        .item-icon-wrapper {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: var(--brand-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .item-icon-wrapper i {
            font-size: 28px;
            color: var(--brand-color);
        }

        .item-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
            /* 超过两行省略号 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: auto; /* 价格始终对齐底部 */
        }

        .item-price::before {
            content: "¥";
            font-size: 13px;
            margin-right: 2px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 底部留白与品牌露出版 */
        footer {
            text-align: center;
            padding: 20px 0 40px;
            color: var(--text-secondary);
            font-size: 12px;
            letter-spacing: 3px;
            font-weight: 500;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <nav class="category-nav" id="nav-container"></nav>
    <main class="menu-container" id="menu-container"></main>

    <footer>
        WINDOW SILL BBQ
    </footer>

    <script>
        // 数据结构保持不变，仅针对不同品类分配了更精准的矢量符号组合
        const menuData = [
            {
                id: 'meat',
                category: '烤肉串',
                icon: 'fa-solid fa-fire', 
                itemIcon: 'fa-solid fa-bacon', // 培根/肉类意向矢量
                items: [
                    { name: '蒜香鲜牛肉串', price: 4 },
                    { name: '原切牛肋条串', price: 8 },
                    { name: '牛油串', price: 18 },
                    { name: '鲜羊肉串', price: 4 },
                    { name: '鸡中翅', price: 12 },
                    { name: '掌中宝', price: 4 },
                    { name: '烤卤鸡爪', price: 10 },
                    { name: '酱香五花肉串', price: 3.3 },
                    { name: '猪肉串', price: 2 },
                    { name: '猪肉筋串', price: 2 },
                    { name: '猪脆骨串', price: 3 },
                    { name: '腊肠小串', price: 10 },
                    { name: '烤鱿鱼须', price: 18, specificIcon: 'fa-solid fa-water' }, // 个别特殊菜品可单独指定图标
                    { name: '烤鱿鱼板', price: 10, specificIcon: 'fa-solid fa-water' },
                    { name: '鸭肠小串', price: 10 },
                    { name: '烤虾', price: 4, specificIcon: 'fa-solid fa-shrimp' },
                    { name: '烤小黄鱼', price: 4, specificIcon: 'fa-solid fa-fish' }
                ]
            },
            {
                id: 'veg',
                category: '素烤',
                icon: 'fa-solid fa-leaf',
                itemIcon: 'fa-solid fa-carrot', // 蔬菜意向矢量
                items: [
                    { name: '烤面筋', price: 2, specificIcon: 'fa-solid fa-wheat-awn' },
                    { name: '烤土豆片', price: 8 },
                    { name: '烤西葫芦', price: 2 },
                    { name: '烤韭菜', price: 8 },
                    { name: '烤茄子', price: 16 },
                    { name: '烤香菇', price: 10 },
                    { name: '烤甜玉米粒', price: 8, specificIcon: 'fa-solid fa-corn' },
                    { name: '烤素鸡', price: 8 },
                    { name: '烤苕皮', price: 8 },
                    { name: '烤奶香小馒头', price: 6 },
                    { name: '烤芝士面包', price: 7, specificIcon: 'fa-solid fa-bread-slice' },
                    { name: '烤河粉', price: 12 },
                    { name: '芝士焗榴莲', price: 25 },
                    { name: '芝士焗红薯', price: 18 },
                    { name: '芝士焗玉米', price: 18 }
                ]
            },
            {
                id: 'fried',
                category: '炸物/小食',
                icon: 'fa-solid fa-utensils',
                itemIcon: 'fa-solid fa-cookie',
                items: [
                    { name: '炸藕条', price: 16 },
                    { name: '小酥肉', price: 25 },
                    { name: '红糖糍粑', price: 18 }
                ]
            },
            {
                id: 'cold',
                category: '凉菜',
                icon: 'fa-solid fa-snowflake',
                itemIcon: 'fa-solid fa-bowl-rice',
                items: [
                    { name: '毛豆', price: 10 },
                    { name: '花生', price: 10 },
                    { name: '拍黄瓜', price: 10 },
                    { name: '凉拌藕带', price: 10 }
                ]
            },
            {
                id: 'beer',
                category: '啤酒',
                icon: 'fa-solid fa-beer-mug-empty',
                itemIcon: 'fa-solid fa-glass-water',
                items: [
                    { name: '比利时小麦', price: 18 },
                    { name: '德式小麦', price: 18 },
                    { name: '荔枝玫瑰', price: 22 },
                    { name: '浑浊IPA', price: 28 }
                ]
            },
            {
                id: 'drink',
                category: '饮料',
                icon: 'fa-solid fa-bottle-water',
                itemIcon: 'fa-solid fa-mug-hot',
                items: [
                    { name: '可乐', price: 5, specificIcon: 'fa-solid fa-bottle-droplet' },
                    { name: '雪碧', price: 5, specificIcon: 'fa-solid fa-bottle-droplet' },
                    { name: '茉莉花茶', price: 10, specificIcon: 'fa-solid fa-leaf' },
                    { name: '矿泉水', price: 3, specificIcon: 'fa-solid fa-bottle-water' }
                ]
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const navContainer = document.getElementById('nav-container');
            const menuContainer = document.getElementById('menu-container');

            let navHTML = '';
            let menuHTML = '';

            menuData.forEach((cat, index) => {
                navHTML += `<a href="#${cat.id}" class="nav-item ${index === 0 ? 'active' : ''}" data-target="${cat.id}">${cat.category}</a>`;

                let itemsHTML = cat.items.map(item => {
                    // 如果单品有特定图标则用特定图标，否则用分类通用图标
                    const finalIcon = item.specificIcon ? item.specificIcon : cat.itemIcon;
                    return `
                    <div class="item-card">
                        <div class="item-icon-wrapper">
                            <i class="${finalIcon}"></i>
                        </div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">${item.price}</div>
                    </div>
                `}).join('');

                menuHTML += `
                    <section id="${cat.id}" class="category-section">
                        <div class="category-header">
                            <i class="${cat.icon}"></i>
                            <h2>${cat.category}</h2>
                        </div>
                        <div class="items-grid">
                            ${itemsHTML}
                        </div>
                    </section>
                `;
            });

            navContainer.innerHTML = navHTML;
            menuContainer.innerHTML = menuHTML;

            const sections = document.querySelectorAll('.category-section');
            const navItems = document.querySelectorAll('.nav-item');

            window.addEventListener('scroll', () => {
                let current = '';
                sections.forEach(section => {
                    const sectionTop = section.offsetTop;
                    if (pageYOffset >= (sectionTop - 150)) {
                        current = section.getAttribute('id');
                    }
                });

                navItems.forEach(item => {
                    item.classList.remove('active');
                    if (item.getAttribute('data-target') === current) {
                        item.classList.add('active');
                        const navCenter = item.offsetLeft - (navContainer.offsetWidth / 2) + (item.offsetWidth / 2);
                        navContainer.scrollTo({ left: navCenter, behavior: 'smooth' });
                    }
                });
            });
            
            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('data-target');
                    const targetSection = document.getElementById(targetId);
                    window.scrollTo({
                        top: targetSection.offsetTop - 60,
                        behavior: 'smooth'
                    });
                });
            });
        });
    </script>
</body>
</html>
